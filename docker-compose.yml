services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: subtitle_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - PHP_OPCACHE_ENABLE=0
    networks:
      - subtitle_net
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:1.25-alpine
    container_name: subtitle_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - subtitle_net
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: subtitle_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-subtitle_system}
      MYSQL_USER: ${DB_USERNAME:-subtitle}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - subtitle_net

  redis:
    image: redis:7-alpine
    container_name: subtitle_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispassword}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - subtitle_net

  minio:
    image: minio/minio:latest
    container_name: subtitle_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console UI
    volumes:
      - minio_data:/data
    networks:
      - subtitle_net

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: subtitle_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --timeout=300 --queue=default,transcribe,translate
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - subtitle_net
    depends_on:
      - mysql
      - redis

volumes:
  mysql_data:
  redis_data:
  minio_data:

networks:
  subtitle_net:
    driver: bridge
